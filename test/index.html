<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Donumate Interaction Test</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 16px; line-height: 1.4; }
    main { max-width: 900px; }
    label { display: block; margin: 10px 0 4px; }
    input, textarea, select, button { font: inherit; margin: 2px 0; }
    textarea { width: 100%; min-height: 80px; }
    button { padding: 6px 10px; cursor: pointer; }
    #mouse-box { margin-top: 12px; height: 120px; border: 2px dashed #555; display: grid; place-items: center; user-select: none; }
    #event-log { height: 260px; white-space: pre; overflow: auto; background: #111; color: #eee; padding: 8px; }
    #spacer { height: 700px; }
  </style>
</head>
<body>
  <main>
    <h1>Donumate Interaction Test</h1>
    <p id="status">ready</p>

    <form id="demo-form">
      <label for="text-input">Text input</label>
      <input id="text-input" name="textInput" type="text" autocomplete="off" placeholder="type here">

      <label for="message-input">Message textarea</label>
      <textarea id="message-input" name="messageInput" placeholder="paste or type message"></textarea>

      <label>
        <input id="agree-checkbox" name="agree" type="checkbox">
        Agree checkbox
      </label>

      <label for="mode-select">Mode select</label>
      <select id="mode-select" name="mode">
        <option value="fast">fast</option>
        <option value="safe">safe</option>
        <option value="debug">debug</option>
      </select>

      <label for="file-input">File input</label>
      <input id="file-input" name="fileInput" type="file">

      <div>
        <button id="primary-button" type="button" data-action="primary">Primary button</button>
        <button id="clear-log" type="button">Clear log</button>
        <button id="export-log" type="button">Export log txt</button>
      </div>
    </form>

    <div id="mouse-box" tabindex="0">Move/click mouse here</div>

    <h2>Event log</h2>
    <pre id="event-log" aria-live="polite"></pre>
    <div id="spacer">scroll target space</div>
  </main>

  <script>
    (() => {
      const storageKey = 'donumate-interaction-log-v1';
      const logEl = document.getElementById('event-log');
      const statusEl = document.getElementById('status');
      const logs = [];
      let lastMove = 0;

      function loadStored() {
        try {
          const stored = JSON.parse(localStorage.getItem(storageKey) || '[]');
          if (Array.isArray(stored)) logs.push(...stored.slice(-300));
        } catch (_) {}
      }

      function saveStored() {
        localStorage.setItem(storageKey, JSON.stringify(logs.slice(-300)));
      }

      function targetName(target) {
        if (!target) return 'unknown';
        const id = target.id ? '#' + target.id : '';
        const name = target.name ? '[name=' + target.name + ']' : '';
        return target.tagName.toLowerCase() + id + name;
      }

      function valueSummary(target) {
        if (!target) return '';
        if (target.type === 'password') return ' value=<hidden>';
        if (target.type === 'checkbox' || target.type === 'radio') return ' checked=' + target.checked;
        if ('value' in target && target.value !== undefined) return ' value=' + JSON.stringify(String(target.value).slice(0, 80));
        return '';
      }

      function render() {
        logEl.textContent = logs.map((item) => item.line).join('\n');
        logEl.scrollTop = logEl.scrollHeight;
        statusEl.textContent = 'events=' + logs.length;
      }

      function record(action, event, extra) {
        const now = new Date().toISOString();
        const parts = [now, 'action=' + action, 'target=' + targetName(event && event.target)];
        if (event && 'key' in event) parts.push('key=' + JSON.stringify(event.key), 'code=' + event.code);
        if (event && 'button' in event) parts.push('button=' + event.button);
        if (event && 'clientX' in event) parts.push('x=' + event.clientX, 'y=' + event.clientY);
        if (event && event.target) parts.push(valueSummary(event.target));
        if (extra) parts.push(extra);
        logs.push({ time: now, action, line: parts.filter(Boolean).join(' | ') });
        if (logs.length > 500) logs.splice(0, logs.length - 500);
        saveStored();
        render();
      }

      function clearLogs() {
        logs.length = 0;
        localStorage.removeItem(storageKey);
        render();
      }

      function exportLogs() {
        record('export', { target: document.getElementById('export-log') });
        const blob = new Blob([logs.map((item) => item.line).join('\n') + '\n'], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'interaction-log.txt';
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      loadStored();
      render();

      document.addEventListener('click', (event) => record('click', event));
      document.addEventListener('mousedown', (event) => record('mousedown', event));
      document.addEventListener('mouseup', (event) => record('mouseup', event));
      document.addEventListener('keydown', (event) => record('keydown', event));
      document.addEventListener('keyup', (event) => record('keyup', event));
      document.addEventListener('input', (event) => record('input', event));
      document.addEventListener('change', (event) => record('change', event));
      document.addEventListener('submit', (event) => {
        event.preventDefault();
        record('submit', event);
      });
      document.addEventListener('mousemove', (event) => {
        const now = performance.now();
        if (now - lastMove < 150) return;
        lastMove = now;
        record('mousemove', event);
      });

      document.getElementById('primary-button').addEventListener('click', () => {
        statusEl.textContent = 'primary-clicked events=' + logs.length;
      });
      document.getElementById('clear-log').addEventListener('click', clearLogs);
      document.getElementById('export-log').addEventListener('click', exportLogs);

      window.__interactionTest = {
        count: () => logs.length,
        text: () => logs.map((item) => item.line).join('\n'),
        has: (action) => logs.some((item) => item.action === action || item.line.includes('action=' + action)),
        clear: clearLogs,
      };
    })();
  </script>
</body>
</html>
