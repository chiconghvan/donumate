name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            pkg_target: node22-win-x64
            asset_name: donumate-windows-x64.exe
          - name: linux-x64
            os: ubuntu-latest
            pkg_target: node22-linux-x64
            asset_name: donumate-linux-x64
          - name: macos-x64
            os: macos-13
            pkg_target: node22-macos-x64
            asset_name: donumate-macos-x64
          - name: macos-arm64
            os: macos-latest
            pkg_target: node22-macos-arm64
            asset_name: donumate-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Package native binary
        shell: bash
        run: |
          mkdir -p release
          pnpm dlx @yao-pkg/pkg package.json --targets ${{ matrix.pkg_target }} --output release/${{ matrix.asset_name }}

      - name: Smoke test binary
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            ./release/${{ matrix.asset_name }} --help
          elif [[ "${{ matrix.name }}" == "macos-arm64" && "$(uname -m)" != "arm64" ]]; then
            echo "Skipping macOS arm64 smoke test on $(uname -m) runner"
          else
            chmod +x ./release/${{ matrix.asset_name }}
            ./release/${{ matrix.asset_name }} --help
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: release/${{ matrix.asset_name }}
          if-no-files-found: error

  scripts-store:
    name: Build scripts store assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate scripts manifest
        run: |
          mkdir -p release
          node --input-type=module <<'NODE'
          import { readdirSync, statSync, writeFileSync } from 'node:fs';
          import { join, relative } from 'node:path';

          const root = 'scripts';
          const files = [];

          function walk(dir) {
            for (const entry of readdirSync(dir)) {
              const path = join(dir, entry);
              const stat = statSync(path);
              if (stat.isDirectory()) walk(path);
              else if (/\.(flow|ts|js|mjs|cjs)$/i.test(entry)) files.push(path);
            }
          }

          try {
            walk(root);
          } catch {
            // No scripts directory yet.
          }

          const scripts = files.sort().map((path) => {
            const id = relative(root, path).replace(/\\/g, '/').replace(/\.[^.]+$/, '');
            return {
              id,
              name: id.split('/').pop(),
              path: path.replace(/\\/g, '/'),
              version: process.env.GITHUB_REF_NAME?.replace(/^v/, '') ?? '0.0.0'
            };
          });

          writeFileSync('release/scripts-manifest.json', `${JSON.stringify({ version: 1, scripts }, null, 2)}\n`);
          NODE

      - name: Archive scripts
        run: |
          if [ -d scripts ]; then
            zip -r release/scripts.zip scripts
          else
            mkdir scripts
            zip -r release/scripts.zip scripts
          fi

      - name: Upload scripts store artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scripts-store
          path: |
            release/scripts-manifest.json
            release/scripts.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build
      - scripts-store
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
